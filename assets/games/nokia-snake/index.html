<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  :root {
    --lcd-bg:    #8bac0f;
    --lcd-dark:  #0f380f;
    --lcd-mid:   #306230;
    --lcd-light: #9bbc0f;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1c1c1c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Phone shell ── */
  .phone {
    background: #222;
    border-radius: 24px 24px 48px 48px;
    padding: 18px 18px 28px;
    width: 284px;
    box-shadow:
      0 0 0 2px #3a3a3a,
      0 12px 40px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ── LCD screen ── */
  .screen-bezel {
    background: #0a130a;
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 14px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
  }

  .screen {
    background: var(--lcd-bg);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 14px rgba(139,172,15,0.25);
  }

  /* Scanline overlay */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 3px
    );
    pointer-events: none;
    z-index: 20;
  }

  #status-bar {
    display: flex;
    justify-content: space-between;
    padding: 3px 5px 2px;
    font-size: 10px;
    font-weight: bold;
    color: var(--lcd-dark);
    letter-spacing: 0.5px;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Overlay (start / game over / pause) */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--lcd-bg);
    z-index: 10;
    gap: 6px;
  }
  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 15px;
    font-weight: bold;
    color: var(--lcd-dark);
    letter-spacing: 2px;
  }

  .overlay-msg {
    font-size: 9px;
    color: var(--lcd-mid);
    text-align: center;
    line-height: 1.7;
    white-space: pre-line;
  }

  .overlay-score {
    font-size: 26px;
    font-weight: bold;
    color: var(--lcd-dark);
    display: none;
  }

  /* ── Buttons ── */
  .btn {
    background: #2e2e2e;
    color: #bbb;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 0 #111, 0 3px 8px rgba(0,0,0,0.5);
    transition: transform 0.05s, box-shadow 0.05s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #111;
  }

  /* D-pad grid */
  .dpad {
    display: grid;
    grid-template-columns: 56px 56px 56px;
    grid-template-rows:   44px 44px 44px;
    gap: 3px;
    justify-content: center;
    margin-top: 28px;
  }

  .btn-up    { grid-column: 2; grid-row: 1; }
  .btn-left  { grid-column: 1; grid-row: 2; }
  .btn-right { grid-column: 3; grid-row: 2; }
  .btn-down  { grid-column: 2; grid-row: 3; }

  /* Action row */
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn-action {
    flex: 1;
    height: 34px;
    border-radius: 17px;
    font-size: 9px;
    letter-spacing: 1px;
    color: #999;
  }

  /* Keyboard hint */
  #kb-hint {
    font-size: 8px;
    color: #555;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #kb-hint.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <!-- Screen -->
  <div class="screen-bezel">
    <div class="screen">
      <div id="status-bar">
        <span id="score-display">SCORE: 0</span>
        <span id="level-display">LV 1</span>
      </div>
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay-title" id="ov-title">SNAKE</div>
        <div class="overlay-msg"   id="ov-msg">Press START to begin</div>
        <div class="overlay-score" id="ov-score"></div>
      </div>
    </div>
  </div>

  <!-- Start / Pause -->
  <div class="action-row">
    <button class="btn btn-action" id="btnStart">START</button>
    <button class="btn btn-action" id="btnPause">PAUSE</button>
  </div>

  <!-- D-pad -->
  <div class="dpad">
    <button class="btn btn-up"    id="btnUp">▲</button>
    <button class="btn btn-left"  id="btnLeft">◀</button>
    <button class="btn btn-right" id="btnRight">▶</button>
    <button class="btn btn-down"  id="btnDown">▼</button>
  </div>

  <div id="kb-hint">⌨ Keyboard active — use arrow keys</div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const CELL = 8;
const COLS = 30;
const ROWS = 25;

canvas.width  = COLS * CELL;  // 240
canvas.height = ROWS * CELL;  // 200

// Nokia LCD palette
const P = {
  bg:    '#8bac0f',
  grid:  '#82a30e',
  dark:  '#0f380f',
  mid:   '#306230',
  light: '#9bbc0f',
};

// ── Game state ────────────────────────────────────────────────
let snake, dir, nextDir, food, score, level, speed;
let running = false, paused = false, dead = false;
let logicInterval, rafId;
let frameCount = 0;

function init() {
  snake   = [{ x:15, y:12 }, { x:14, y:12 }, { x:13, y:12 }];
  dir     = { x:1, y:0 };
  nextDir = { x:1, y:0 };
  food    = null;
  score   = 0;
  level   = 1;
  speed   = 200;
  frameCount = 0;
  placeFood();
  updateHUD();
}

function placeFood() {
  let f;
  do {
    f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === f.x && s.y === f.y));
  food = f;
}

function updateHUD() {
  document.getElementById('score-display').textContent = 'SCORE: ' + score;
  document.getElementById('level-display').textContent = 'LV ' + level;
}

// ── Rendering (rAF loop) ──────────────────────────────────────
function render() {
  rafId = requestAnimationFrame(render);
  frameCount++;
  draw();
}

function draw() {
  // Background
  ctx.fillStyle = P.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = P.grid;
  ctx.lineWidth = 0.4;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Top boundary line
  ctx.strokeStyle = P.dark;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, 1); ctx.lineTo(canvas.width, 1); ctx.stroke();

  // Snake body
  for (let i = snake.length - 1; i >= 1; i--) {
    const s = snake[i];
    ctx.fillStyle = P.mid;
    ctx.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
    ctx.fillStyle = P.dark;
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  }

  // Food — dark border + bright centre, opposite of snake body (mid border + dark centre)
  if (food) {
    const pulse = Math.floor(frameCount / 20) % 2 === 0;
    ctx.fillStyle = P.dark;
    ctx.fillRect(food.x * CELL, food.y * CELL, CELL, CELL);
    ctx.fillStyle = pulse ? P.light : P.mid;
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, 4, 4);
  }

  // Snake head
  const h = snake[0];
  ctx.fillStyle = P.dark;
  ctx.fillRect(h.x * CELL, h.y * CELL, CELL, CELL);

  // Eyes based on direction
  ctx.fillStyle = P.light;
  if (dir.x === 1)       { ctx.fillRect(h.x*CELL+5, h.y*CELL+1, 2, 2); ctx.fillRect(h.x*CELL+5, h.y*CELL+5, 2, 2); }
  else if (dir.x === -1) { ctx.fillRect(h.x*CELL+1, h.y*CELL+1, 2, 2); ctx.fillRect(h.x*CELL+1, h.y*CELL+5, 2, 2); }
  else if (dir.y === -1) { ctx.fillRect(h.x*CELL+1, h.y*CELL+1, 2, 2); ctx.fillRect(h.x*CELL+5, h.y*CELL+1, 2, 2); }
  else                   { ctx.fillRect(h.x*CELL+1, h.y*CELL+5, 2, 2); ctx.fillRect(h.x*CELL+5, h.y*CELL+5, 2, 2); }
}

// ── Haptic helper ─────────────────────────────────────────────
const vibrate = pattern => navigator.vibrate && navigator.vibrate(pattern);

// ── Game logic tick ───────────────────────────────────────────
function tick() {
  if (!running || paused || dead) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    vibrate(40);
    score += 10;
    const newLevel = Math.min(10, Math.floor(score / 50) + 1);
    if (newLevel > level) {
      level = newLevel;
      speed = Math.max(80, 200 - (level - 1) * 14);
      clearInterval(logicInterval);
      logicInterval = setInterval(tick, speed);
    }
    placeFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

// ── Game control ──────────────────────────────────────────────
function startGame() {
  clearInterval(logicInterval);
  cancelAnimationFrame(rafId);

  init();
  running = true;
  paused  = false;
  dead    = false;

  hideOverlay();
  render();
  logicInterval = setInterval(tick, speed);
}

function endGame() {
  dead    = true;
  running = false;
  clearInterval(logicInterval);
  vibrate([80, 60, 80]);
  showOverlay('GAME OVER', 'Press START\nto play again', score);
}

function togglePause() {
  if (!running || dead) return;
  paused = !paused;
  if (paused) {
    clearInterval(logicInterval);
    showOverlay('PAUSED', 'Press PAUSE\nto continue');
  } else {
    hideOverlay();
    logicInterval = setInterval(tick, speed);
  }
}

// ── Overlay helpers ───────────────────────────────────────────
function showOverlay(title, msg, sc) {
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-msg').textContent   = msg;
  const scoreEl = document.getElementById('ov-score');
  if (sc !== undefined) { scoreEl.style.display = 'block'; scoreEl.textContent = sc; }
  else                  { scoreEl.style.display = 'none'; }
  document.getElementById('overlay').classList.remove('hidden');
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// ── Direction setter (prevents 180° reversal) ─────────────────
function setDir(dx, dy) {
  if (dx !== 0 && dir.x !== 0) return;
  if (dy !== 0 && dir.y !== 0) return;
  nextDir = { x: dx, y: dy };
  if (!running || dead) startGame();
}

// ── Keyboard input ────────────────────────────────────────────
let keyboardActive = false;

document.addEventListener('keydown', e => {
  if (!keyboardActive) {
    keyboardActive = true;
    document.getElementById('kb-hint').classList.add('visible');
  }
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); setDir(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); setDir(0,  1); break;
    case 'ArrowLeft':  e.preventDefault(); setDir(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); setDir( 1, 0); break;
    case 'Enter':
    case ' ':
      e.preventDefault();
      if (!running || dead) startGame(); else togglePause();
      break;
  }
});

// ── D-pad button bindings ─────────────────────────────────────
// touchstart fires instantly on mobile (no 300ms click delay).
// preventDefault suppresses the synthetic click so there's no double-fire.
// The click listener still handles mouse input on desktop.
const dpadMap = [
  ['btnUp',    0, -1],
  ['btnDown',  0,  1],
  ['btnLeft',  -1, 0],
  ['btnRight',  1, 0],
];
dpadMap.forEach(([id, dx, dy]) => {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); setDir(dx, dy); }, { passive: false });
  btn.addEventListener('click', () => setDir(dx, dy));
});

document.getElementById('btnStart').addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnPause').addEventListener('touchstart', e => { e.preventDefault(); togglePause(); }, { passive: false });
document.getElementById('btnPause').addEventListener('click', togglePause);

// ── Swipe on canvas ───────────────────────────────────────────
let swipeX, swipeY;

canvas.addEventListener('touchstart', e => {
  swipeX = e.touches[0].clientX;
  swipeY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (swipeX === undefined) return;
  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 8 && ady < 8) {
    if (!running || dead) startGame(); else togglePause();
  } else if (adx > ady) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  swipeX = undefined;
}, { passive: false });

// ── Boot ─────────────────────────────────────────────────────
init();
render();   // draw idle frame
showOverlay('SNAKE', 'Press START to begin');
</script>
</body>
</html>
